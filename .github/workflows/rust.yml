name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make check

  fmt:
    name: Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: rustup component add rustfmt
      - run: make fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: rustup component add clippy
      - run: make clippy

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make unit-test

  test-core:
    name: Integration Tests (core)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make test-core

  test-net:
    name: Integration Tests (net)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make test-net

  test-jsonrpc:
    name: Integration Tests (jsonrpc)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make test-jsonrpc

  test-p2p:
    name: Integration Tests (p2p)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make test-p2p

  test-swarm:
    name: Integration Tests (swarm)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make test-swarm

  test-eventemitter:
    name: Integration Tests (eventemitter)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable && rustup default stable
      - run: make test-eventemitter
