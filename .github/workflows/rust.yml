name: Cargo Build & Test

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@v3
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - name: Build with smol
        run: cargo build --workspace --verbose
      - name: Build with tokio
        run: cargo build --workspace --no-default-features --features tokio --features tcp --features derive --verbose

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        runtime: [smol, tokio]
    steps:
      - uses: actions/checkout@v3
      - run: rustup update stable && rustup default stable
      - name: Unit tests (smol)
        if: matrix.runtime == 'smol'
        run: cargo test --workspace --lib --verbose
      - name: Unit tests (tokio)
        if: matrix.runtime == 'tokio'
        run: cargo test --workspace --no-default-features --features tokio --features tcp --features derive --lib --verbose

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        runtime: [smol, tokio]
    steps:
      - uses: actions/checkout@v3
      - run: rustup update stable && rustup default stable
      - name: Integration tests p2p (smol)
        if: matrix.runtime == 'smol'
        run: cargo test -p karyon_p2p --test net_simulation --verbose
      - name: Integration tests p2p (tokio)
        if: matrix.runtime == 'tokio'
        run: cargo test -p karyon_p2p --no-default-features --features tokio --test net_simulation --verbose
      - name: Integration tests jsonrpc (smol)
        if: matrix.runtime == 'smol'
        run: cargo test -p karyon_jsonrpc --test integration --verbose
      - name: Integration tests jsonrpc (tokio)
        if: matrix.runtime == 'tokio'
        run: cargo test -p karyon_jsonrpc --no-default-features --features tokio --features tcp --test integration --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: rustup update stable && rustup default stable
      - name: Run clippy
        run: cargo clippy -- -D warnings
      - name: Run fmt
        run: cargo fmt --all -- --check
